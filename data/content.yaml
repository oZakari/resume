Profile: >
  Cloud Platform and Software Engineer with 10+ years of experience designing, building, and shipping production-grade software, open-source frameworks, developer tooling, and distributed cloud systems at scale.
  Creator and maintainer of open-source modules adopted across hundreds of thousands of deployments and tens of thousands of customers.
  Deep expertise in open-source software development (Bicep, Terraform, PowerShell), CI/CD pipeline engineering, and enterprise cloud architecture.
  Proven technical lead driving complex software delivery, open-source collaboration, and developer enablement across Microsoft's engineering and product teams.

RecentHighlights:
  - Header: Azure Landing Zones – Bicep Lead
    Details:
      - Built and led the ALZ-Bicep framework from the ground up, architecting a modular platform of 19 Azure Verified Modules that powers tens of thousands of enterprise deployments across hundreds of customers, delivering end-to-end customization, Azure Deployment Stacks integration, decoupled policy management, and modern Bicep parameter file support.
      - Recognized as ALZ Lead and Cloud Adoption Framework Evangelist (3x).
  - Header: Azure Verified Modules (AVM)
    Details:
      - Built and own 14 Azure Verified Modules for Platform Landing Zones, adopted across hundreds of thousands of deployments and tens of thousands of customers.
      - Recognized as Platinum Contributor, Community Champion, and Bicep Coach for sustained open-source contributions and cross-team enablement.
  - Header: APRL Technical Lead
    Details:
      - Led architecture, development, and ownership of the Azure Proactive Resiliency Library (APRL), stabilizing CI/CD pipelines, standardizing metadata schemas, and implementing secure PowerShell code signing.
  - Header: Technical Escalation & Reliability
    Details:
      - Served as the primary escalation point for high-severity infrastructure and code issues, unblocking millions of dollars in customer revenue by resolving complex IaC and platform engineering challenges.
      - Led Well-Architected Reliability Assessments (WARAs) and remediation engagements, driving adoption of resiliency best practices across enterprise environments.
  - Header: Community & Field Enablement
    Details:
      - Managed the 3,800+ member ALZ-Bicep channel, presented at community calls (90–120 attendees, 2,500+ views), delivered Level-Up training sessions.
      - Mentored 25+ engineers and both senior and early-career CSAs on IaC, DevOps, CAF, and WAF best practices.

