baseURL = 'https://cv.ztrocinski.co.us'
languageCode = 'en-us'
defaultContentLanguage = 'en'
enableRobotsTXT = true
enableEmoji = true
title = 'Zach Trocinski – Resume'
theme = 'almeida-cv'
disableKinds = ['page', 'section', 'taxonomy', 'term', 'RSS', 'sitemap']

[params]
  enableMetaTags = true
  colorLight = '#f8f9fa'
  colorDark = '#2d3436'
  colorPageBackground = '#e0e0e0'
  colorPrimary = '#1a8a6e'
  colorSecondary = '#5a6c72'
  colorIconPrimary = '#f8f9fa'
  colorIconBackground = '#1a8a6e'
  colorRightColumnBackground = '#f1f3f5'
  colorRightColumnHeadingText = '#2d3436'
  colorRightColumnBodyText = '#4a5568'
  colorRightColumnIconPrimary = '#f8f9fa'
  colorRightColumnIconBackground = '#1a8a6e'
  pages = 3
  swapColumns = false
